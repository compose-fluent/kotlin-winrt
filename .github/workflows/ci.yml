name: CI

on:
  push:
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE*'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE*'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    # windows-2022 uses Windows Server 2022 and is the closest GitHub-hosted runner for
    # testing Windows 10/11 API compatibility on x64.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Windows SDK 10.0.22621.0
        # The GitHub-hosted windows-2022 runner ships with SDK 10.0.19041.0 pre-installed.
        # The project discovers the SDK dynamically via registry; installing 10.0.22621.0 ensures
        # the latest available version is the one the SDK-version-sensitive tests expect.
        shell: pwsh
        run: |
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\References\10.0.22621.0"
          if (Test-Path $sdkPath) {
            Write-Host "Windows SDK 10.0.22621.0 already installed at $sdkPath"
          } else {
            winget install --id Microsoft.WindowsSDK.10.0.22621 `
              --silent `
              --accept-source-agreements `
              --accept-package-agreements
            # winget exits with a non-zero code when the package is already present;
            # reset the exit code so the step does not fail for that reason.
            if ($LASTEXITCODE -ne 0) {
              Write-Host "winget exited with code $LASTEXITCODE (may indicate already installed)"
            }
          }

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          # Cache the NuGet global packages folder so Microsoft.WindowsAppSDK is not
          # re-downloaded on every run, and the nuget.exe binary cached by the build script.
          path: |
            ~\.nuget\packages
            ~\.gradle\caches\kotlin-winrt\nuget
          key: nuget-${{ runner.os }}-Microsoft.WindowsAppSDK-2.1.3
          restore-keys: nuget-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        shell: bash
        run: |
          ./gradlew \
            :winrt-runtime:assemble \
            :winrt-metadata:assemble \
            :winrt-generator:assemble \
            :winrt-authoring:assemble \
            :winrt-compiler-plugin:assemble \
            :winrt-projections:assemble \
            :winrt-samples:assemble \
            --no-configuration-cache

      - name: Test
        # Pass winmd.nugetComponents so that:
        #   - :generated-winrt-bindings:restoreNuGetWinMdPackages restores Microsoft.WindowsAppSDK
        #   - :sample-jvm-winui3:collectWinUiRuntimeAssets stages the runtime DLLs for tests
        # WINDOWS_KITS_10_DIR lets WindowsSdkReferences.discoverReferencesRoot() find the SDK
        # installed by the step above through the env-var fallback path.
        shell: bash
        env:
          WINDOWS_KITS_10_DIR: C:\Program Files (x86)\Windows Kits\10
        run: |
          ./gradlew \
            :winrt-runtime:jvmTest \
            :winrt-runtime:mingwX64Test \
            :winrt-metadata:test \
            :winrt-generator:test \
            :winrt-authoring:jvmTest \
            :winrt-authoring:mingwX64Test \
            :winrt-compiler-plugin:test \
            :winrt-projections:jvmTest \
            :winrt-projections:mingwX64Test \
            :winrt-samples:winuiJvmTest \
            :winrt-samples:mingwX64Test \
            -Pwinmd.nugetComponents=Microsoft.WindowsAppSDK@2.1.3 \
            --no-configuration-cache
