name: Publish Projections

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish projection artifacts to Maven Central'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      publicationKind:
        description: 'Projection publication kind; snapshot appends the kotlin-winrt snapshot suffix, release uses metadata baseline artifact versions'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - 'snapshot'
          - 'release'
      releaseTag:
        description: 'kotlin-winrt release tag used for release projection dependencies, for example v0.1.0; required when publicationKind is release'
        required: false
        default: ''
      windowsAppSdkVersion:
        description: 'Microsoft.WindowsAppSDK version used for the prebuilt projection'
        required: true
        default: '2.1.3'
      windowsSdkVersions:
        description: 'Comma-separated Windows SDK metadata versions to publish as windows-sdk projection versions'
        required: true
        default: '10.0.26100.0,10.0.22621.0,10.0.22000.0,10.0.19041.0'
      windowsAppSdkWindowsSdkVersion:
        description: 'Windows SDK projection version used by the Windows App SDK projection'
        required: true
        default: '10.0.26100.0'

permissions:
  contents: read

jobs:
  publish-projections:
    name: Publish Prebuilt Projections
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Windows SDK baselines
        shell: pwsh
        run: |
          $versions = @("${{ inputs.windowsSdkVersions }}".Split(",") + "${{ inputs.windowsAppSdkWindowsSdkVersion }}")
            | ForEach-Object { $_.Trim() }
            | Where-Object { $_ }
            | Select-Object -Unique
          function Install-WindowsSdkBaseline([string] $version) {
            $packageVersion = $version -replace '\.0$', ''
            $packageId = "Microsoft.WindowsSDK.$packageVersion"
            $winget = Get-Command winget -ErrorAction SilentlyContinue
            if ($winget) {
              Write-Host "Installing $packageId for Windows SDK $version via winget"
              winget install --id $packageId `
                --silent `
                --accept-source-agreements `
                --accept-package-agreements
              if ($LASTEXITCODE -ne 0) {
                Write-Host "winget exited with code $LASTEXITCODE for $packageId (may indicate already installed)"
              }
              return
            }

            $componentId = switch ($version) {
              "10.0.19041.0" { "Microsoft.VisualStudio.Component.Windows10SDK.19041" }
              "10.0.22000.0" { "Microsoft.VisualStudio.Component.Windows10SDK.22000" }
              "10.0.22621.0" { "Microsoft.VisualStudio.Component.Windows11SDK.22621" }
              "10.0.26100.0" { "Microsoft.VisualStudio.Component.Windows11SDK.26100" }
              default { "" }
            }
            if (-not $componentId) {
              Write-Error "No Visual Studio Installer component mapping is configured for Windows SDK $version, and winget is unavailable."
              exit 1
            }
            $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
            if (-not (Test-Path $vsWhere) -or -not (Test-Path $vsInstaller)) {
              Write-Error "Cannot install Windows SDK $version because neither winget nor Visual Studio Installer is available."
              exit 1
            }
            $installPath = & $vsWhere -latest -property installationPath
            if (-not $installPath) {
              Write-Error "Cannot install Windows SDK $version because Visual Studio installation path was not found."
              exit 1
            }
            Write-Host "Installing $componentId for Windows SDK $version via Visual Studio Installer"
            $process = Start-Process `
              -FilePath $vsInstaller `
              -ArgumentList @(
                "modify",
                "--installPath", $installPath,
                "--add", $componentId,
                "--quiet",
                "--norestart",
                "--nocache"
              ) `
              -Wait `
              -PassThru
            if ($process.ExitCode -ne 0 -and $process.ExitCode -ne 3010) {
              Write-Error "Visual Studio Installer exited with code $($process.ExitCode) while installing $componentId."
              exit $process.ExitCode
            }
          }
          foreach ($version in $versions) {
            $sdkPath = "C:\Program Files (x86)\Windows Kits\10\References\$version"
            if (Test-Path $sdkPath) {
              Write-Host "Windows SDK $version already installed at $sdkPath"
              continue
            }
            Install-WindowsSdkBaseline $version
            if (-not (Test-Path $sdkPath)) {
              Write-Error "Windows SDK $version was not found at $sdkPath after installation."
              exit 1
            }
          }

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~\.nuget\packages
            ~\.gradle\caches\kotlin-winrt\nuget
          key: nuget-${{ runner.os }}-Microsoft.WindowsAppSDK-${{ inputs.windowsAppSdkVersion }}-sdk-${{ inputs.windowsSdkVersions }}-${{ inputs.windowsAppSdkWindowsSdkVersion }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Publication Kind
        shell: pwsh
        run: |
          if ("${{ inputs.publicationKind }}" -eq "release" -and "${{ inputs.releaseTag }}" -notmatch '^v\d+\.\d+\.\d+(-.*)?$') {
            Write-Error "releaseTag must look like vX.Y.Z when publicationKind is release."
            exit 1
          }

      - name: Compile Projection Artifacts
        shell: pwsh
        run: |
          $releaseArgs = @()
          if ("${{ inputs.publicationKind }}" -eq "release") {
            $releaseArgs += "-Pwinrt.releaseTag=${{ inputs.releaseTag }}"
          }
          $sdkVersions = @("${{ inputs.windowsSdkVersions }}".Split(",") + "${{ inputs.windowsAppSdkWindowsSdkVersion }}")
            | ForEach-Object { $_.Trim() }
            | Where-Object { $_ }
            | Select-Object -Unique
          foreach ($sdkVersion in $sdkVersions) {
            .\gradlew.bat `
              :winrt-projections:windows-sdk:compileKotlin `
              "-PkotlinWinRt.projections.windowsSdkVersion=$sdkVersion" `
              $releaseArgs `
              --no-configuration-cache
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          .\gradlew.bat `
            :winrt-projections:windows-app-sdk:compileKotlin `
            "-PkotlinWinRt.projections.windowsSdkVersion=${{ inputs.windowsAppSdkWindowsSdkVersion }}" `
            "-PkotlinWinRt.projections.windowsAppSdkVersion=${{ inputs.windowsAppSdkVersion }}" `
            $releaseArgs `
            --no-configuration-cache

      - name: Verify Projection Publications Locally
        shell: pwsh
        run: |
          $releaseArgs = @()
          if ("${{ inputs.publicationKind }}" -eq "release") {
            $releaseArgs += "-Pwinrt.releaseTag=${{ inputs.releaseTag }}"
          }
          $sdkVersions = @("${{ inputs.windowsSdkVersions }}".Split(",") + "${{ inputs.windowsAppSdkWindowsSdkVersion }}")
            | ForEach-Object { $_.Trim() }
            | Where-Object { $_ }
            | Select-Object -Unique
          foreach ($sdkVersion in $sdkVersions) {
            .\gradlew.bat `
              :winrt-projections:windows-sdk:publishToMavenLocal `
              "-PkotlinWinRt.projections.windowsSdkVersion=$sdkVersion" `
              $releaseArgs `
              --no-configuration-cache
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          .\gradlew.bat `
            :winrt-projections:windows-app-sdk:publishToMavenLocal `
            "-PkotlinWinRt.projections.windowsSdkVersion=${{ inputs.windowsAppSdkWindowsSdkVersion }}" `
            "-PkotlinWinRt.projections.windowsAppSdkVersion=${{ inputs.windowsAppSdkVersion }}" `
            $releaseArgs `
            --no-configuration-cache

      - name: Check Maven Central secrets
        if: inputs.publish == 'true'
        shell: bash
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_KEY_ID: ${{ secrets.MAVEN_GPG_KEY_ID }}
          MAVEN_GPG_KEY_ARMOR: ${{ secrets.MAVEN_GPG_KEY_ARMOR }}
          MAVEN_GPG_KEY_PASSWORD: ${{ secrets.MAVEN_GPG_KEY_PASSWORD }}
        run: |
          missing=()
          for name in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD MAVEN_GPG_KEY_ID MAVEN_GPG_KEY_ARMOR MAVEN_GPG_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            printf 'Missing required repository secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Publish Projection Artifacts
        if: inputs.publish == 'true'
        shell: pwsh
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MAVEN_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_KEY_ARMOR }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_KEY_PASSWORD }}
        run: |
          $releaseArgs = @()
          if ("${{ inputs.publicationKind }}" -eq "release") {
            $releaseArgs += "-Pwinrt.releaseTag=${{ inputs.releaseTag }}"
          }
          $sdkVersions = @("${{ inputs.windowsSdkVersions }}".Split(",") + "${{ inputs.windowsAppSdkWindowsSdkVersion }}")
            | ForEach-Object { $_.Trim() }
            | Where-Object { $_ }
            | Select-Object -Unique
          foreach ($sdkVersion in $sdkVersions) {
            .\gradlew.bat `
              :winrt-projections:windows-sdk:publishAllPublicationsToMavenCentralRepository `
              "-PkotlinWinRt.projections.windowsSdkVersion=$sdkVersion" `
              $releaseArgs `
              --no-configuration-cache
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          .\gradlew.bat `
            :winrt-projections:windows-app-sdk:publishAllPublicationsToMavenCentralRepository `
            "-PkotlinWinRt.projections.windowsSdkVersion=${{ inputs.windowsAppSdkWindowsSdkVersion }}" `
            "-PkotlinWinRt.projections.windowsAppSdkVersion=${{ inputs.windowsAppSdkVersion }}" `
            $releaseArgs `
            --no-configuration-cache
