name: Publish Snapshot

on:
  push:
    branches:
      - master
  schedule:
    # Run every Sunday at 00:00 UTC.
    - cron: '0 0 * * 0'

permissions:
  contents: read

jobs:
  publish-snapshot:
    name: Publish Snapshot to Maven Central
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Windows SDK 10.0.22621.0
        shell: pwsh
        run: |
          $sdkPath = "C:\Program Files (x86)\Windows Kits\10\References\10.0.22621.0"
          if (Test-Path $sdkPath) {
            Write-Host "Windows SDK 10.0.22621.0 already installed at $sdkPath"
          } else {
            winget install --id Microsoft.WindowsSDK.10.0.22621 `
              --silent `
              --accept-source-agreements `
              --accept-package-agreements
            if ($LASTEXITCODE -ne 0) {
              Write-Host "winget exited with code $LASTEXITCODE (may indicate already installed)"
            }
          }

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~\.nuget\packages
            ~\.gradle\caches\kotlin-winrt\nuget
          key: nuget-${{ runner.os }}-Microsoft.WindowsAppSDK-1.8.260317003
          restore-keys: nuget-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        shell: bash
        run: ./gradlew build -x test

      - name: Test
        shell: bash
        env:
          WINDOWS_KITS_10_DIR: C:\Program Files (x86)\Windows Kits\10
        run: ./gradlew test -Pwinmd.nugetComponents=Microsoft.WindowsAppSDK@1.8.260317003

      - name: Verify Publish to Maven Local
        # Verify that the publication artifacts can be generated locally without signing.
        # This catches POM/metadata configuration issues before attempting the real publish.
        shell: bash
        run: ./gradlew publishToMavenLocal

      - name: Publish Snapshot
        shell: bash
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MAVEN_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_KEY_PASSWORD }}
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
